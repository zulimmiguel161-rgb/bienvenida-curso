<!-- Le dice al navegador que este archivo es un documento HTML5 -->
<!DOCTYPE html>

<!-- Aquí comienza nuestra página web -->
<!-- El atributo "lang" indica el idioma principal de la página -->
<html lang="es">

  <!-- La cabeza de la página -->
  <!-- Aquí colocamos información que el usuario no ve directamente -->
  <head>

    <!-- Permite mostrar correctamente letras como á, é, í, ó, ú y ñ -->
    <meta charset="UTF-8">

    <!-- Hace que la página se adapte al tamaño de la pantalla -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Es el nombre que aparece en la pestaña del navegador -->
    <title>Mi primera página web</title>

  </head>

  <!-- Aquí va todo lo que sí verá el usuario -->
  <body>
    <h1>Hola mundo!</h1>
    <h2>Mi nombre es Zulim</h2>
    <p>Me gustan los gatos :) </p>
  </body>

</html>
